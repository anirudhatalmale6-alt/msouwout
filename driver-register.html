<style>
  :root{
    --blue:#00209F; --blue-d:#001873; --red:#D21034; --green:#0F9D58;
    --ink:#0d1330; --muted:#5b6484; --line:#e4e7f2; --bg:#f5f6fb;
    --card:#ffffff; --radius:18px; --shadow:0 10px 30px rgba(13,19,48,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    line-height:1.5;padding-bottom:env(safe-area-inset-bottom)}
  img{max-width:100%}

  /* Header */
  .hdr{position:sticky;top:0;z-index:40;background:#fff;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top))}
  .hdr .logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--ink)}
  .hdr .logo img{height:34px}
  .hdr .logo b{font-family:'Poppins';font-weight:800;font-size:16px}
  .hdr .logo b span{color:var(--red)}
  .lang{display:flex;gap:4px;background:var(--bg);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;font:600 12px 'Inter';color:var(--muted);
    padding:5px 9px;border-radius:999px;cursor:pointer}
  .lang button.on{background:var(--blue);color:#fff}

  /* Progress */
  .prog{background:#fff;padding:16px;border-bottom:1px solid var(--line)}
  .prog-track{height:6px;background:var(--line);border-radius:999px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));
    width:50%;border-radius:999px;transition:width .35s ease}
  .prog-steps{display:flex;justify-content:space-between;margin-top:10px}
  .prog-steps span{font:600 12px 'Inter';color:var(--muted)}
  .prog-steps span.on{color:var(--blue)}

  .wrap{max-width:520px;margin:0 auto;padding:20px 16px 40px}

  .step{display:none;animation:fade .3s ease}
  .step.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .h1{font-family:'Poppins';font-weight:800;font-size:24px;letter-spacing:-.5px}
  .sub{color:var(--muted);font-size:14px;margin:4px 0 20px}

  .field{margin-bottom:16px}
  .field label{display:block;font-weight:600;font-size:13px;margin-bottom:7px}
  .field label .opt{color:var(--muted);font-weight:400}
  .field label .req{color:var(--red)}
  .field input, .field select{width:100%;padding:14px;border:1.5px solid var(--line);
    border-radius:12px;font-size:15px;font-family:'Inter';background:#fff;color:var(--ink);
    transition:border-color .15s}
  .field input:focus, .field select:focus{outline:none;border-color:var(--blue)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* driver type toggle */
  .dtype{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .dtype label{cursor:pointer}
  .dtype input{position:absolute;opacity:0;pointer-events:none}
  .dtype .box{border:2px solid var(--line);border-radius:14px;padding:18px 12px;text-align:center;
    transition:.15s;background:#fff}
  .dtype .box .emo{font-size:32px;display:block}
  .dtype .box .nm{font-weight:700;font-size:15px;margin-top:6px}
  .dtype input:checked + .box{border-color:var(--blue);background:#eef1ff;
    box-shadow:0 0 0 3px rgba(0,32,159,.12)}

  /* document tiles */
  .docs{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .doc{position:relative;border:2px dashed var(--line);border-radius:14px;
    aspect-ratio:1/.82;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:10px;cursor:pointer;overflow:hidden;background:#fff;transition:.15s}
  .doc:active{transform:scale(.98)}
  .doc.done{border-style:solid;border-color:var(--green)}
  .doc input{position:absolute;inset:0;opacity:0;cursor:pointer}
  .doc .emo{font-size:26px}
  .doc .nm{font-weight:600;font-size:12px;margin-top:6px;color:var(--ink)}
  .doc .hint{font-size:10px;color:var(--muted);margin-top:2px}
  .doc .prev{position:absolute;inset:0;object-fit:cover;display:none}
  .doc.done .prev{display:block}
  .doc .badge{position:absolute;top:6px;right:6px;background:var(--green);color:#fff;
    width:22px;height:22px;border-radius:999px;display:none;align-items:center;justify-content:center;
    font-size:12px;z-index:2}
  .doc.done .badge{display:flex}

  .terms{display:flex;align-items:flex-start;gap:10px;margin:18px 0;font-size:13px;color:var(--muted)}
  .terms input{width:20px;height:20px;flex-shrink:0;accent-color:var(--blue)}
  .terms a{color:var(--blue);font-weight:600;text-decoration:none}

  .btns{display:flex;gap:12px;margin-top:8px}
  .btn{flex:1;border:0;border-radius:14px;padding:16px;font:700 16px 'Inter';cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;text-decoration:none}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--blue);color:#fff}
  .btn-primary:disabled{opacity:.55;cursor:not-allowed}
  .btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line);flex:0 0 auto;padding:16px 22px}
  .btn.load{pointer-events:none;opacity:.75}
  .spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;
    border-radius:50%;animation:sp .7s linear infinite;display:none}
  .btn.load .spin{display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}

  .err{color:var(--red);font-size:13px;margin-top:6px;font-weight:600;display:none}

  /* success */
  .done-screen{display:none;text-align:center;padding:30px 8px}
  .done-screen.on{display:block;animation:fade .4s ease}
  .check{width:90px;height:90px;border-radius:50%;background:#e9f7ef;color:var(--green);
    display:flex;align-items:center;justify-content:center;font-size:46px;margin:0 auto 18px;
    animation:pop .5s cubic-bezier(.2,1.4,.5,1)}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
  .done-screen h2{font-family:'Poppins';font-weight:800;font-size:24px}
  .done-screen p{color:var(--muted);margin-top:8px;font-size:15px}
  .status-pill{display:inline-flex;align-items:center;gap:8px;background:#fff7e6;color:#b8860b;
    font-weight:700;padding:10px 18px;border-radius:999px;margin:20px 0 6px;font-size:14px}
  .status-pill .dot{width:9px;height:9px;border-radius:50%;background:#f5a623;
    animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .eta{color:var(--muted);font-size:13px;margin-bottom:26px}
  .done-actions{display:flex;flex-direction:column;gap:12px;max-width:340px;margin:0 auto}
  .done-actions .btn{width:100%}
  .btn-green{background:var(--green);color:#fff}
</style>

<header class="hdr">
  <a href="index.html" class="logo">
    <img src="assets/msouwout-icon.png" alt="MsouWout" onerror="this.src='assets/icon-192.png'">
    <b>Msou<span>Wout</span></b>
  </a>
  <div class="lang">
    <button data-lang="ht" class="on">HT</button>
    <button data-lang="fr">FR</button>
    <button data-lang="en">EN</button>
    <button data-lang="es">ES</button>
  </div>
</header>

<div class="prog" id="progBar">

  <div class="prog-steps">
    <span class="on" id="ps1" data-i18n="ps1">1. Enfòmasyon</span>
    <span id="ps2" data-i18n="ps2">2. Verifikasyon</span>
  </div>
</div>

<div class="wrap">

  <!-- STEP 1 -->
  <section class="step on" id="step1">
    <h1 class="h1" data-i18n="s1_title">Vin yon Chofè MsouWout</h1>
    <p class="sub" data-i18n="s1_sub">Enfòmasyon de baz — sa pran 30 segond.</p>

    <div class="field">
      <label data-i18n="l_ref">Ki moun ki refere w? <span class="req">*</span></label>
      <select id="referral">
        <option value="" disabled selected data-i18n="ref_ph">-- Chwazi --</option>
        <option value="FTPH">FTPH</option>
        <option value="COTRASMOTHA">COTRASMOTHA</option>
        <option value="SPAP">SPAP</option>
        <option value="Eglise Shalom">Eglise Shalom</option>
        <option value="Facebook">Facebook</option>
        <option value="WhatsApp">WhatsApp</option>
        <option value="Friend/Family" data-i18n="ref_friend">Zanmi / Fanmi</option>
        <option value="Other" data-i18n="ref_other">Lòt</option>
      </select>
    </div>

    <div class="row2">
      <div class="field">
        <label data-i18n="l_first">Non <span class="req">*</span></label>
        <input id="firstName" type="text" data-i18n-ph="ph_first" placeholder="Jean">
      </div>
      <div class="field">
        <label data-i18n="l_last">Siyati <span class="req">*</span></label>
        <input id="lastName" type="text" data-i18n-ph="ph_last" placeholder="Baptiste">
      </div>
    </div>

    <div class="field">
      <label data-i18n="l_phone">Telefòn (WhatsApp) <span class="req">*</span></label>
      <input id="phone" type="tel" inputmode="numeric" placeholder="+509 XXXX XXXX" data-i18n-ph="ph_phone">
    </div>

    <div class="field">
      <label data-i18n="l_email">Imèl <span class="opt" data-i18n="opt">(opsyonèl)</span></label>
      <input id="email" type="email" placeholder="nom@email.com">
    </div>

    <div class="field">
      <label data-i18n="l_city">Vil <span class="req">*</span></label>
      <input id="city" type="text" data-i18n-ph="ph_city" placeholder="Port-au-Prince" list="cityList">
      <datalist id="cityList">
        <option>Port-au-Prince</option><option>Cap-Haïtien</option><option>Les Cayes</option>
        <option>Gonaïves</option><option>Pétion-Ville</option><option>Delmas</option>
        <option>Carrefour</option><option>Jacmel</option><option>Saint-Marc</option><option>Jérémie</option>
      </datalist>
    </div>

    <div class="field">
      <label data-i18n="l_dtype">Kalite Chofè <span class="req">*</span></label>
      <div class="dtype">
        <label>
          <input type="radio" name="dtype" value="motorcycle" checked>
          <div class="box"><span class="emo">🛵</span><span class="nm" data-i18n="dt_moto">Moto</span></div>
        </label>
        <label>
          <input type="radio" name="dtype" value="car">
          <div class="box"><span class="emo">🚗</span><span class="nm" data-i18n="dt_car">Machin</span></div>
        </label>
      </div>
    </div>

    <p class="err" id="err1"></p>
    <div class="btns" style="margin-top:18px">
      <button class="btn btn-primary" id="next1">
        <span data-i18n="continue">Kontinye</span> →
      </button>
    </div>
  </section>

  <!-- STEP 2 -->
  <section class="step" id="step2">
    <h1 class="h1" data-i18n="s2_title">Verifikasyon</h1>
    <p class="sub" data-i18n="s2_sub">Pran yon foto pou chak dokiman. Sa rete prive.</p>

    <div class="docs">
      <label class="doc" data-doc="Selfie">
        <span class="badge">✓</span><img class="prev" alt="">
        <span class="emo">🤳</span><span class="nm" data-i18n="d_selfie">Selfie</span>
        <input type="file" accept="image/*" capture="user" data-doc-input>
      </label>
      <label class="doc" data-doc="ID">
        <span class="badge">✓</span><img class="prev" alt="">
        <span class="emo">🪪</span><span class="nm" data-i18n="d_id">Kat / Paspò</span>
        <input type="file" accept="image/*" capture="environment" data-doc-input>
      </label>
      <label class="doc" data-doc="License">
        <span class="badge">✓</span><img class="prev" alt="">
        <span class="emo">🚘</span><span class="nm" data-i18n="d_lic">Lisans Chofè</span>
        <input type="file" accept="image/*" capture="environment" data-doc-input>
      </label>
      <label class="doc" data-doc="OAVCT">
        <span class="badge">✓</span><img class="prev" alt="">
        <span class="emo">📄</span><span class="nm" data-i18n="d_oavct">OAVCT</span>
        <input type="file" accept="image/*" capture="environment" data-doc-input>
      </label>
      <label class="doc" data-doc="Vehicle">
        <span class="badge">✓</span><img class="prev" alt="">
        <span class="emo">🚙</span><span class="nm" data-i18n="d_veh">Foto Machin</span>
        <input type="file" accept="image/*" capture="environment" data-doc-input>
      </label>
      <label class="doc" data-doc="Insurance">
        <span class="badge">✓</span><img class="prev" alt="">
        <span class="emo">🛡️</span><span class="nm" data-i18n="d_ins">Asirans</span>
        <span class="hint" data-i18n="d_opt">opsyonèl</span>
        <input type="file" accept="image/*" capture="environment" data-doc-input>
      </label>
    </div>

    <div class="field" style="margin-top:16px">
      <label data-i18n="l_plate">Nimewo Plak <span class="req">*</span></label>
      <input id="plate" type="text" placeholder="AA-12345" data-i18n-ph="ph_plate" style="text-transform:uppercase">
    </div>

    <label class="terms">
      <input type="checkbox" id="terms">
      <span data-i18n="terms">Mwen dakò ak Kondisyon yo ak Règleman MsouWout.</span>
    </label>

    <p class="err" id="err2"></p>
    <div class="btns">
      <button class="btn btn-ghost" id="back2" data-i18n="back">← Retounen</button>
      <button class="btn btn-primary" id="submitBtn">
        <span class="spin"></span>
        <span data-i18n="submit">Voye pou Verifikasyon</span>
      </button>
    </div>
  </section>

  <!-- SUCCESS -->
  <section class="done-screen" id="doneScreen">
    <div class="check">✓</div>
    <h2 data-i18n="ok_title">Mèsi!</h2>
    <p data-i18n="ok_sub">Aplikasyon ou an resevwa.</p>
    <div class="status-pill"><span class="dot"></span><span data-i18n="ok_status">Anba Revizyon</span></div>
    <p class="eta" data-i18n="ok_eta">Verifikasyon prevwa: nan 24 èdtan</p>
    <div class="done-actions">
      <button class="btn btn-primary" id="shareBtn">📱 <span data-i18n="ok_share">Pataje MsouWout</span></button>
      <a class="btn btn-green" href="https://haitibiznis.com/koutye.html">💰 <span data-i18n="ok_paren">Vin Parenaj Biznis pandan w ap tann</span></a>
    </div>
  </section>

</div>

var currentLang = localStorage.getItem('mw_lang') || 'ht';

function setLang(lang){
  if(!T[lang]) return;
  currentLang = lang;
  localStorage.setItem('mw_lang', lang);
  document.documentElement.lang = lang;
  var t = T[lang];
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k = el.getAttribute('data-i18n');
    if(t[k]) el.textContent = t[k];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(function(el){
    var k = el.getAttribute('data-i18n-ph');
    if(t[k]) el.setAttribute('placeholder', t[k]);
  });
  document.querySelectorAll('.lang button').forEach(function(b){
    b.classList.toggle('on', b.getAttribute('data-lang') === lang);
  });
}
document.querySelectorAll('.lang button').forEach(function(b){
  b.addEventListener('click', function(){ setLang(b.getAttribute('data-lang')); });
});

/* ══════════ navigation ══════════ */
function gotoStep(n){
  document.getElementById('step1').classList.toggle('on', n===1);
  document.getElementById('step2').classList.toggle('on', n===2);
  document.getElementById('progFill').style.width = (n===1?'50%':'100%');
  document.getElementById('ps1').classList.toggle('on', n>=1);
  document.getElementById('ps2').classList.toggle('on', n>=2);
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('next1').addEventListener('click', function(){
  var t = T[currentLang];
  var first = val('firstName'), last = val('lastName'), phone = val('phone'), city = val('city');
  var referral = val('referral');
  var digits = phone.replace(/[^0-9]/g,'').replace(/^509/,'');
  if(!referral || !first || !last || !city || !digits){ return showErr('err1', t.e_req); }
  if(digits.length < 8){ return showErr('err1', t.e_phone); }
  hideErr('err1');
  gotoStep(2);
});
document.getElementById('back2').addEventListener('click', function(){ gotoStep(1); });

/* ══════════ document tiles ══════════ */
var docFiles = {};
document.querySelectorAll('.doc').forEach(function(doc){
  var input = doc.querySelector('[data-doc-input]');
  var prev = doc.querySelector('.prev');
  input.addEventListener('change', function(){
    var f = input.files && input.files[0];
    if(!f) return;
    docFiles[doc.getAttribute('data-doc')] = f;
    doc.classList.add('done');
    var reader = new FileReader();
    reader.onload = function(e){ prev.src = e.target.result; };
    reader.readAsDataURL(f);
  });
});

/* ══════════ submit ══════════ */
document.getElementById('submitBtn').addEventListener('click', function(){
  var t = T[currentLang];
  var btn = this;
  var required = ['Selfie','ID','License','OAVCT','Vehicle'];
  var missing = required.filter(function(k){ return !docFiles[k]; });
  if(missing.length){ return showErr('err2', t.e_docs); }
  if(!val('plate')){ return showErr('err2', t.e_req); }
  if(!document.getElementById('terms').checked){ return showErr('err2', t.e_terms); }
  hideErr('err2');

  btn.classList.add('load'); btn.disabled = true;

  var first = val('firstName'), last = val('lastName');
  var fullName = (first + ' ' + last).trim();
  var digits = val('phone').replace(/[^0-9]/g,'').replace(/^509/,'');
  var vType = (document.querySelector('input[name="dtype"]:checked')||{}).value || 'motorcycle';
  var plate = val('plate').toUpperCase();
  var city = val('city');
  var email = val('email');
  var referral = val('referral');

  // 1) create the real driver record in the backend (for admin approval)
  var apiData = {
    full_name: fullName,
    phone: '+509' + digits,
    email: email || '',
    vehicle_type: vType,
    license_plate: plate,
    referral_partner: referral,
    preferred_service: 'both'
  };
  fetch('https://msouwout-backend.onrender.com/api/drivers', {
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body: JSON.stringify(apiData)
  }).catch(function(){});

  // 2) send full application + document photos to the team (email notification)
  var fd = new FormData();
  fd.append('_subject', 'New MsouWout Driver: ' + fullName);
  fd.append('Referred By', referral);
  fd.append('Full Name', fullName);
  fd.append('Phone / WhatsApp', '+509 ' + digits);
  fd.append('Email', email || '(none)');
  fd.append('City', city);
  fd.append('Driver Type', vType);
  fd.append('License Plate', plate);
  Object.keys(docFiles).forEach(function(k){ fd.append(k, docFiles[k], k + '-' + digits + '.jpg'); });

  fetch('https://formsubmit.co/ajax/business@haitibiznis.com', {
    method:'POST', body: fd
  }).then(finish).catch(finish);

  function finish(){
    document.getElementById('step1').classList.remove('on');
    document.getElementById('step2').classList.remove('on');
    document.getElementById('progBar').style.display = 'none';
    document.getElementById('doneScreen').classList.add('on');
    window.scrollTo({top:0,behavior:'smooth'});
    btn.classList.remove('load'); btn.disabled = false;
  }
});

/* ══════════ share ══════════ */
document.getElementById('shareBtn').addEventListener('click', function(){
  var url = 'https://msouwout.com';
  var msg = 'Vin yon chofè MsouWout — enskri isit la: ' + url;
  if(navigator.share){
    navigator.share({title:'MsouWout', text:msg, url:url}).catch(function(){});
  } else {
    window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
  }
});

/* ══════════ helpers ══════════ */
function val(id){ return (document.getElementById(id).value || '').trim(); }
function showErr(id, m){ var e=document.getElementById(id); e.textContent=m; e.style.display='block'; }
function hideErr(id){ document.getElementById(id).style.display='none'; }

setLang(currentLang);
</script>
